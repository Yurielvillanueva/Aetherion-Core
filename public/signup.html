<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | Aetherion Core</title>
  <link rel="icon" type="image/png" href="/images/favicon.png" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="auth-page">
  <main class="auth-card">
    <h1>Create Account</h1>
    <p>Join Aetherion Core and start playing today.</p>
    <form id="signup-form">
      <label>Username</label>
      <input type="text" name="username" required />
      <label>Email</label>
      <input type="email" name="email" required />
      <label>Password</label>
      <input type="password" name="password" required minlength="8" />
      <button type="submit" class="button button-primary">Sign Up</button>
      <p class="small">Already have an account? <a href="/login.html">Login</a></p>
      <p id="signup-error" class="form-error"></p>
    </form>
  </main>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
